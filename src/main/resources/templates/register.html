<!DOCTYPE html>
<!--
  Transaction register (plan stage 7a) + the entry dock (7b): the newest-at-bottom list of postings
  to the viewed accounts, with a persistent bottom entry dock for new transactions.

    • A row is one posting to a viewed account (register §2.4). Columns are fixed
      (colour spine · Date · Account · Payee · Category · Amount · Balance · status — §2.5).
    • Same-hue zebra from the account's stored hue (§2.8): two shades of one hue, alternated per
      account thread — the tint tells you which balance thread a number belongs to.
    • German money (§2.9): base bare, non-base with symbol. Income green; negative balances red;
      pending_review rows muted with a — balance (§2.10).
    • Newest at the bottom (§2.1): the page scrolls to the bottom on load (keyboard.js leaf), so
      "now" and the entry dock are co-located.

  Filters (§2.3): date range (default last 12 months), account multi-select, payee — a plain GET
  form; the same view re-renders. Sorting is deferred (plan §14); order is fixed date-ascending.

  The entry dock (7b) hx-posts to /register/entry (the commit endpoint lives in operations — plan
  stage 7 boundary note). On commit the whole rows body re-renders for the active filter (a bounded
  re-fetch — the Q-UI-5 fallback, §2.2), so a backdated insert re-threads every affected balance
  below it, not just the newest row. The dock's rows fragment is reused verbatim by that response.
-->
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: page(~{:: content})}"
>
  <main class="content" th:fragment="content">
<!--    <div class="leaf-head">-->
<!--      <p class="eyebrow">Register</p>-->
<!--      <h1>Transaction register</h1>-->
<!--      <p class="lede">-->
<!--        Your accounts, threaded by date — oldest at the top, newest at the bottom, each account-->
<!--        keeping its own running balance.-->
<!--      </p>-->
<!--    </div>-->

    <form class="register-filter" method="get" th:action="@{/register}">
      <fieldset class="register-filter__accounts">
        <legend class="eyebrow">Accounts</legend>
        <label class="check" th:each="a : ${register.accounts()}">
          <input
            type="checkbox"
            name="accountId"
            th:value="${a.accountId()}"
            th:checked="${a.selected()}"
          />
          <span
            class="swatch"
            th:style="${a.hue() != null} ? |background: hsl(${a.hue()} 55% 78%); border-color: hsl(${a.hue()} 55% 45%)|"
          ></span>
          <span th:text="${a.name()}">Cash</span>
          <span class="muted num" th:text="${a.currencyCode()}">EUR</span>
        </label>
        <!-- People (register §2.6, plan stage 8c): each per-person debt leaf as a filter option,
             labelled `Name (CUR)`, selectable alongside the real accounts. The value is the leaf's
             own account id, so a ticked person filters to their debt thread exactly as an account
             does. (The block grows bulky with many people — collapsing it is a later UX pass.) -->
        <label class="check" th:each="p : ${register.people()}">
          <input
            type="checkbox"
            name="accountId"
            th:value="${p.accountId()}"
            th:checked="${p.selected()}"
          />
          <span
            class="swatch"
            th:style="${p.hue() != null} ? |background: hsl(${p.hue()} 55% 78%); border-color: hsl(${p.hue()} 55% 45%)|"
          ></span>
          <span th:text="${p.entryValue()}">Max (EUR)</span>
        </label>
      </fieldset>
      <div class="register-filter__row">
        <div class="field">
          <label class="field__label" for="fromDate">From</label>
          <input
            id="fromDate"
            name="fromDate"
            type="date"
            class="input"
            th:value="${register.filter().fromDate()}"
          />
        </div>
        <div class="field">
          <label class="field__label" for="toDate">To</label>
          <input
            id="toDate"
            name="toDate"
            type="date"
            class="input"
            th:value="${register.filter().toDate()}"
          />
        </div>
        <div class="field">
          <label class="field__label" for="payeeId">Payee</label>
          <select id="payeeId" name="payeeId" class="input">
            <option value="">— all payees —</option>
            <option
              th:each="p : ${register.payees()}"
              th:value="${p.payeeId()}"
              th:selected="${p.selected()}"
              th:text="${p.name()}"
            >
              Rewe
            </option>
          </select>
        </div>
        <p class="actions">
          <button type="submit" class="btn">Apply</button>
        </p>
      </div>
    </form>

    <!-- The whole rows region is a named fragment (a div, not a bare tbody) so the commit response
         can re-render it wholesale for the active filter (bounded re-fetch, §2.2). It must be a
         parse-safe top-level element: a bare <tbody> in an htmx response is discarded by the HTML
         parser (a tbody outside a table is invalid), so the swap target is this div. -->
    <div id="register-body" th:fragment="rows(register)">
      <p class="muted" th:if="${#lists.isEmpty(register.rows())}" id="register-empty">
        No transactions in this view. Enter one below, or widen the date range.
      </p>

      <div class="register-scroll" data-scroll-bottom th:unless="${#lists.isEmpty(register.rows())}">
        <table class="register">
          <thead>
            <tr>
              <th class="register__spine" aria-hidden="true"></th>
              <th scope="col">Date</th>
              <th scope="col">Account</th>
              <th scope="col">Payee</th>
              <th scope="col">Category</th>
              <th scope="col" class="num">Amount</th>
              <th scope="col" class="num">Balance</th>
              <th scope="col" class="register__status">
                <span class="visually-hidden">Status</span>
              </th>
            </tr>
          </thead>
          <tbody id="register-rows" data-kbd-list>
            <tr
            th:each="r : ${register.rows()}"
            class="register__row"
            data-kbd-row
            th:attr="data-transaction-id=${r.transactionId()}"
            tabindex="-1"
            th:classappend="${r.pending()} ? 'register__row--pending'"
            th:style="${r.accountHue() != null}
              ? (${r.zebraDark()}
                  ? |background: hsl(${r.accountHue()} 40% 90%)|
                  : |background: hsl(${r.accountHue()} 38% 95%)|)"
          >
            <td
              class="register__spine"
              th:style="${r.accountHue() != null} ? |background: hsl(${r.accountHue()} 55% 78%)|"
            ></td>
            <td class="register__date num" th:text="${r.date()}">2026-01-01</td>
            <!-- Account cell (register §2.6): a real account is a bare name; a person's debt leg
                 carries a direction arrow on the side that reads as the flow through them —
                 → Name on a debit (income, they owe you more), Name → on a credit (you owe them
                 more) — plan stage 8c. -->
            <td class="register__account" th:style="${r.accountHue() != null} ? |color: hsl(${r.accountHue()} 55% 25%)|">
              <th:block th:if="${r.accountPerson()}"
                ><span th:if="${r.income()}" aria-hidden="true">→&nbsp;</span
                ><span th:text="${r.accountName()}">Max</span
                ><span th:unless="${r.income()}" aria-hidden="true">&nbsp;→</span
              ></th:block>
              <span th:unless="${r.accountPerson()}" th:text="${r.accountName()}">Cash</span>
            </td>
            <td class="register__payee" th:text="${r.payeeName()}">Rewe</td>
            <td class="register__category">
              <!-- A counterpart chip (register §2.6): a plain category, a transfer to another own
                   account (leading ←/→), or a person's debt leg (→ Name on a debit, Name → on a
                   credit — plan stage 8c). -->
              <span
                th:each="chip, i : ${r.category().chips()}"
                class="cat-chip"
                th:classappend="${chip.transfer()} ? 'cat-chip--transfer' : (${chip.person()} ? 'cat-chip--person' : '')"
              >
                <span
                  th:if="${chip.transfer()}"
                  aria-hidden="true"
                  th:text="${chip.inbound()} ? '← ' : '→ '"
                  >→ </span
                ><span
                  th:if="${chip.person() and !chip.inbound()}"
                  aria-hidden="true"
                  >→ </span
                ><span th:text="${chip.label()}">Food</span
                ><span
                  th:if="${chip.person() and chip.inbound()}"
                  aria-hidden="true"
                  > →</span
                >
              </span>
              <span
                class="cat-chip__overflow muted"
                th:if="${r.category().overflow() > 0}"
                th:text="'· +' + ${r.category().overflow()}"
                >· +2</span
              >
              <!-- Tag chips (register §3.6, plan stage 7e): the leg's own tags, canonical
                   Parent:Child labels, after the counterpart summary. -->
              <span
                th:each="tag : ${r.tags()}"
                class="tag-chip"
                th:text="'#' + ${tag}"
                >#Trip:Prague</span
              >
            </td>
            <td
              class="register__amount num"
              th:classappend="${r.income()} ? 'num--income'"
              th:text="${r.amountDisplay()}"
            >
              -20,00
            </td>
            <td
              class="register__balance num"
              th:classappend="${r.negativeBalance()} ? 'num--credit'"
              th:text="${r.balanceDisplay()}"
            >
              -150,00
            </td>
            <td class="register__status">
              <span
                class="recon"
                th:classappend="'recon--' + ${r.reconciliation()}"
                th:title="${r.reconciliation()}"
                aria-hidden="true"
                >●</span
              >
              <span class="recon recon--pending" th:if="${r.pending()}" title="Pending review"
                >◷</span
              >
              <!-- Edit affordance (register §3.1): loads this transaction into the dock's edit mode.
                   hx-includes the dock's active-filter hidden fields so the edit dock keeps
                   repainting the current view. Keyboard: the row is [data-kbd-row]; Enter on it
                   activates this button (keyboard.js clicks the row's first button). -->
              <button
                type="button"
                class="register__edit"
                title="Edit transaction"
                th:attr="hx-get=@{/register/edit/{id}(id=${r.transactionId()})}"
                hx-include="[name='viewAccountId'], [name='viewFromDate'], [name='viewToDate'], [name='viewPayeeId']"
                hx-target="#entry-dock"
                hx-swap="outerHTML"
              >
                ✎
              </button>
            </td>
          </tr>
        </tbody>
      </table>
      </div>
    </div>

    <!-- The persistent entry dock (register §3). Included from its own fragment so the commit
         response can re-render it (reset to a fresh new-transaction state). -->
    <div
      th:replace="~{fragments/entry-dock :: dock(${register}, false, null, ${amountFields})}"
    ></div>
    <!-- The category-currency picker's add-currency dialog mount (plan stage 7d.1) — outside the
         dock's own <form>: the dialog carries its own <form>, and nesting forms is invalid HTML
         (the 6d precedent, accounts.html). Stable by id, so it survives every dock re-render. -->
    <div
      th:replace="~{fragments/currency-picker :: dialogMount('entry-category-currency')}"
    ></div>
  </main>
</html>
