<!DOCTYPE html>
<!--
  People screen (plan stage 8d): the roster of persons the debts module tracks, each with their
  per-currency debt balances and a supplementary base-currency total, and the create-person form.

    • A person's position is a small set of signed per-currency balances (sign = direction:
      positive means they owe you, negative means you owe them) — currencies are never netted
      against each other (data-model §7). A mark-to-market base-currency total (named in that
      currency) sits beside them only when it adds something: a person holding a non-base currency.
      An all-base position shows no gloss — the total would just restate the figure.
    • Each person is a native <details>: collapsed shows the signed figures and base gloss; expanded
      shows the directional wording, a link into the register pre-filtered to their leaves, and the
      edit page (rename / soft-delete). No bespoke JS — <details> is server-rendered HTML.
    • The list view is served by operations' PeopleOverviewController (the base total needs ledger's
      rates); the create form and edit page below POST to debts' own PersonController.

  Standard server-rendered form POSTs with redirect-after-post; no bespoke JS.
-->
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{layout :: page(~{:: content})}"
>
  <main class="content" th:fragment="content">
    <section class="panel">
      <p class="eyebrow">People</p>
      <p class="muted" th:if="${#lists.isEmpty(overview.people())}">No people yet.</p>
      <ul class="people-list" th:unless="${#lists.isEmpty(overview.people())}">
        <li th:each="p : ${overview.people()}" th:with="settled=${#lists.isEmpty(p.lines())}">
          <details class="person">
            <summary class="person__summary">
              <span class="person__name" th:text="${p.name()}">Max</span>
              <span class="person__net num">
                <span th:if="${settled}" class="muted">Settled</span>
                <th:block th:unless="${settled}">
                  <span
                    th:each="line, it : ${p.lines()}"
                    class="person__figure"
                    th:classappend="${line.negative()} ? 'num--credit'"
                  >
                    <span th:unless="${it.first}" class="person__sep">·</span>
                    <span th:text="${line.amount()}">&minus;10,00</span>
                  </span>
                  <span
                    th:if="${p.baseTotalShown()}"
                    class="person__base muted"
                    th:classappend="${p.baseTotalNegative()} ? 'num--credit'"
                    >(&asymp; <span th:text="${p.baseTotal()}">&minus;5,50</span>
                    <span th:text="${overview.baseCurrencyCode()}">EUR</span>)</span
                  >
                </th:block>
              </span>
            </summary>
            <div class="person__detail">
              <ul class="person__breakdown" th:unless="${settled}">
                <li th:each="line : ${p.lines()}" th:text="${line.direction()}">
                  You owe 10,00
                </li>
              </ul>
              <p class="muted" th:if="${settled}">Nothing outstanding.</p>
              <p class="person__links">
                <a
                  th:unless="${#lists.isEmpty(p.accountIds())}"
                  th:href="@{/register(accountId=${p.accountIds()})}"
                  >View in register</a
                >
                <a th:href="@{/people/{id}(id=${p.personId()})}">Edit</a>
              </p>
            </div>
          </details>
        </li>
      </ul>
    </section>

    <section class="panel">
      <p class="eyebrow">Add a person</p>
      <form method="post" th:action="@{/people}" class="form">
        <div class="field">
          <label class="field__label" for="name">Name</label>
          <input id="name" name="name" type="text" class="input" required autocomplete="off" />
        </div>
        <p class="actions">
          <button type="submit" class="btn">Add person</button>
        </p>
      </form>
    </section>
  </main>
</html>
