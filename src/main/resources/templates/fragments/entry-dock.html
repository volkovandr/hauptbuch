<!DOCTYPE html>
<!--
  The register's entry dock (register §3, plan stages 7b/7c/7d.1) — the persistent bottom form for
  entering a new single-category transaction, or editing an existing one in place (§3.1). The
  `edit` fragment argument drives the two modes: null → new mode (＋ New transaction, Add button);
  a DockEditModel → edit mode (✎ Edit transaction, pre-filled fields, a hidden transactionId, and
  Save · Void · Cancel). Saving posts to the same /register/entry endpoint — the hidden
  transactionId makes it re-thread rather than record (§3.3).

  Field order (register §3.2): Date · Account · Payee · Amount · Category · Currency · Note · Add —
  driven by the autofill rule (the amount precedes the category so the single ghost suggestion is
  correct). The category-currency selector sits beside Category (register §3.5); overriding it away
  from the funding account's currency declares the transaction cross-currency and reveals the extra
  amount field(s) (§3.8a).

  No bespoke JS beyond the keyboard leaf (CLAUDE.md §1.6):
    • Payee and Category are native <input list="…"> datalists — browser type-ahead, zero custom JS.
    • Create-new is server-side: an unmatched payee string is parsed and created at commit
      (operations → ledger PayeeService); an unmatched category is resolved/created by the
      categories module via /categories/resolve, which OOB-swaps the hidden categoryId.
    • The ghost suggestion (§3.9) is fetched on payee change (GET /register/ghost) and fills the
      category field — a single suggestion, never a replayed split.
    • The currency selector and the funding Account select both hx-post to /register/currency-fields
      on change (plan stage 7d.1): the response OOB-swaps the currency picker (so its shown value
      stays in sync — e.g. reset to the new account's currency) and swaps in the extra amount
      field(s) for the resolved selection. The Account select's hx-include deliberately omits the
      (possibly stale) categoryCurrencyCode, so an account change always re-derives the default.

  On commit the form hx-posts to /register/entry (operations — plan stage 7 boundary note). The
  response re-renders the whole rows body for the active filter (carried as hidden fields) — a
  bounded re-fetch so a backdated insert re-threads every affected balance below it (§2.2, Q-UI-5) —
  and resets the dock. keyboard.js re-anchors the newest-at-bottom scroll after the swap.
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- The dock. Wrapped in a stable id so the commit response can re-render it (reset). The active
         filter rides along as hidden fields so the commit knows which view to repaint.

         `oob` marks the copy returned by the commit response: it carries hx-swap-oob so htmx lifts
         it out to replace the live #entry-dock (reset), while the rows region is the primary swap.
         The initial page render passes oob=false — an inert form, no self-OOB. -->
    <form
      th:fragment="dock(register, oob, edit, amountFields)"
      th:with="isEdit=${edit != null and edit.transactionId() != null}"
      id="entry-dock"
      class="entry-dock"
      th:classappend="${isEdit} ? 'entry-dock--edit'"
      hx-post="/register/entry"
      hx-target="#register-body"
      hx-swap="outerHTML"
      th:attr="hx-swap-oob=${oob} ? 'true'"
    >
      <!-- `edit` non-null pre-fills the fields; only a non-null transactionId (isEdit) turns on the
           edit chrome (title, hidden id, Save/Void). A pre-filled NEW dock (edit set, id null) is how
           Cancel returns a split panel without losing the header + first line (register §3.9). -->
      <p class="entry-dock__title eyebrow" th:if="${!isEdit}">＋ New transaction</p>
      <p class="entry-dock__title eyebrow" th:if="${isEdit}">✎ Edit transaction</p>

      <!-- Edit mode: the hidden id that turns the commit into an in-place re-thread (§3.1/§3.3). -->
      <input th:if="${isEdit}" type="hidden" name="transactionId" th:value="${edit.transactionId()}" />

      <!-- The active filter, so the commit re-renders exactly the current view (§2.2).

           Only an EXPLICIT account filter is carried. On the default view every option reads as
           selected, so serialising those would freeze the resolved default set into a real filter —
           and any account not in the picker (a person's debt leaf, plan stage 8b.1) would silently
           drop out of the view on the next commit. An empty selection means "the default set", and
           must stay empty for the server to re-resolve it. -->
      <th:block th:if="${!register.filter().accountIds().isEmpty()}">
        <th:block th:each="a : ${register.accounts()}">
          <input
            th:if="${a.selected()}"
            type="hidden"
            name="viewAccountId"
            th:value="${a.accountId()}"
          />
        </th:block>
      </th:block>
      <input type="hidden" name="viewFromDate" th:value="${register.filter().fromDate()}" />
      <input type="hidden" name="viewToDate" th:value="${register.filter().toDate()}" />
      <input type="hidden" name="viewPayeeId" th:value="${register.filter().payeeId()}" />

      <div class="entry-dock__fields">
        <!-- 1 · Date -->
        <div class="field">
          <label class="field__label" for="entry-date">Date</label>
          <input
            id="entry-date"
            name="date"
            type="date"
            class="input"
            th:value="${edit != null} ? ${edit.date()} : ${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
            data-kbd-new
            required
          />
        </div>

        <!-- 2 · Account (funding leg) — a typed datalist, not a <select> (register §3.3, plan
             stage 8b.1). Its options are the open own accounts as "Name (CUR)" plus
             `for <person>` / `by <person>` for every live person; a person's underlying leaf is
             never listed under its own cosmetic name. Typing a person who does not exist yet
             CREATES them, so "Max paid for a pure expense of mine" (register §2.6 pattern 3) is
             entered as Account = `by Max` with no separate person field.

             Because the field is free text, the hidden accountId below is authoritative and is
             cleared whenever the text no longer resolves — a stale id must never ride along under
             changed text (§3.3). Both the fresh and the edit render pre-fill text AND id together,
             so the common path (accept the default, type nothing) commits exactly as the old
             <select> did. -->
        <div class="field">
          <label
            class="field__label"
            for="entry-account"
            title="An account, or a person: type `for Max` (Max owes you) / `by Max` (you owe Max). A person who does not exist yet is created."
            >Account</label
          >
          <input
            id="entry-account"
            name="accountText"
            class="input"
            list="entry-account-options"
            autocomplete="off"
            required
            th:value="${edit != null and edit.accountEntryText() != null}
                      ? ${edit.accountEntryText()} : ${register.defaultAccountEntryText()}"
            hx-post="/register/account/resolve"
            hx-trigger="change"
            hx-target="#entry-account-resolved"
            hx-swap="innerHTML"
          />
          <datalist id="entry-account-options">
            <option th:each="a : ${register.accounts()}" th:value="${a.entryValue()}"></option>
            <option th:each="p : ${register.personTargets()}" th:value="${p}"></option>
          </datalist>
        </div>
        <!-- Funding-leg reveal (register §3.3, plan stage 8b.1): resolving the Account field changes
             the funding leg, so the amount-field layout and the currency default must recompute —
             mirrors the transfer counterpart-resolved chain below.

             The hx-include deliberately omits the (possibly stale) categoryCurrencyCode, exactly as
             the old Account <select> did: changing the funding leg must always re-derive the
             currency default — from the new account's currency, or, when the leg is a person, from
             the transaction-currency rule (§3.5). Including it would pin the old override. -->
        <span
          hidden
          hx-post="/register/currency-fields"
          hx-trigger="account-resolved from:body"
          hx-include="[name='date'], [name='accountId'], [name='amount'],
                      [name='fundingPersonName'], [name='fundingPersonDirection']"
          hx-target="#entry-currency-amount"
          hx-swap="outerHTML"
        ></span>

        <!-- 3 · Payee (datalist + create-new-at-commit). Changing it fetches the ghost category. -->
        <div class="field">
          <label class="field__label" for="entry-payee">Payee</label>
          <input
            id="entry-payee"
            name="payeeText"
            class="input"
            list="entry-payee-options"
            autocomplete="off"
            placeholder="Rewe - Dortmund - Germany"
            th:value="${edit != null} ? ${edit.payeeText()}"
            hx-get="/register/ghost"
            hx-trigger="change"
            hx-target="#entry-ghost"
            hx-swap="innerHTML"
          />
          <!-- The option value is the "Name - City - Country" entry form the create-new parser
               round-trips back to the same payee, so re-picking reuses it (register §3.4). -->
          <datalist id="entry-payee-options">
            <option
              th:each="p : ${register.payees()}"
              th:value="${p.entryValue()}"
            ></option>
          </datalist>
        </div>

        <!-- 4 · Amount (sign-free magnitude; explicit +/- overrides — §3.8). Labelled with the
             funding account's own currency (register §3.8a, plan stage 7d.1) so it stays
             unambiguous once the category-currency override reveals further currencies — a
             separate fragment (with hx-swap-oob baked in, inert here since it is nested, not
             top-level) so /register/currency-fields can refresh just the label when the account
             changes, carrying the currently-typed value along rather than resetting it. -->
        <th:block th:with="entryAmountText=${edit != null} ? ${edit.amount()}">
          <div
            th:replace="~{fragments/entry-dock :: fundingAmountField(fields=${amountFields}, amountText=${entryAmountText}, oob=false)}"
          ></div>
        </th:block>

        <!-- 5 · Category (datalist; resolve/create via categories on change, into the hidden id) -->
        <div class="field">
          <label
            class="field__label"
            for="entry-category"
            title="Food, or Food - Milk to create a leaf. To → Account / From ← Account transfers. for Max / by Max attributes it to a person (data-model §7)."
            >Category</label
          >
          <input
            id="entry-category"
            name="categoryText"
            class="input"
            list="entry-category-options"
            autocomplete="off"
            placeholder="Food  ·  or  for Max"
            th:value="${edit != null} ? ${edit.categoryEntryText()}"
            hx-post="/categories/resolve"
            hx-trigger="change"
            hx-target="#entry-category-resolved"
            hx-swap="innerHTML"
          />
          <!-- Categories plus the transfer targets (register §3.5, plan stage 7d.3) and the person
               targets (register §3.5, plan stage 8b, data-model §7): picking a `To → <account>` /
               `From ← <account>` routes the counter-leg to a real account; `for <person>` / `by
               <person>` routes it to that person's per-currency debt leaf. The server resolver
               (/categories/resolve) tells the three apart by the prefix. -->
          <datalist id="entry-category-options">
            <option
              th:each="c : ${register.categories()}"
              th:value="${c.name()}"
            ></option>
            <option
              th:each="t : ${register.transferTargets()}"
              th:value="${t}"
            ></option>
            <option
              th:each="p : ${register.personTargets()}"
              th:value="${p}"
            ></option>
          </datalist>
        </div>

        <!-- Category currency (register §3.5): defaults to the funding account's currency; the
             shared currency-picker fragment offers "Add currency…" like every other picker
             (CLAUDE.md 6d). Overriding it declares the transaction cross-currency and reveals the
             extra amount field(s) below (§3.8a). -->
        <div
          class="field"
          hx-post="/register/currency-fields"
          hx-trigger="change"
          hx-include="closest form"
          hx-target="#entry-currency-amount"
          hx-swap="outerHTML"
        >
          <label class="field__label" for="entry-category-currency">Currency</label>
          <div
            th:replace="~{fragments/currency-picker :: picker('entry-category-currency', 'categoryCurrencyCode', ${amountFields.categoryCurrencyCode()}, false)}"
          ></div>
        </div>

        <!-- The extra amount field(s) for a cross-currency entry (§3.8a): the category leg's own
             native magnitude, and — only when neither leg is the book's base currency — a
             confirmable base amount pre-filled from rate_as_of. Empty (no fields) in the
             untouched single-currency case. -->
        <div
          id="entry-currency-amount"
          th:replace="~{fragments/entry-dock :: extraAmountFields(fields=${amountFields})}"
        ></div>

        <!-- Transfer reveal (register §3.8a, plan stage 7d.3): a transfer's counterpart currency is
             fixed by the resolved account, not the currency selector, so its cross-currency reveal
             can't ride the selector's change. The /categories/resolve response raises an
             `HX-Trigger-After-Swap: counterpart-resolved` header — after-swap so the resolved
             categoryId + transferDirection inputs are in the form before this listener re-fetches
             the amount-field layout (which derives the counterpart currency from the resolved
             account) and swaps in the counterpart-amount field. Standard htmx event wiring — no
             bespoke JS (CLAUDE.md §1.6). -->
        <span
          hidden
          hx-post="/register/currency-fields"
          hx-trigger="counterpart-resolved from:body"
          hx-include="closest form"
          hx-target="#entry-currency-amount"
          hx-swap="outerHTML"
        ></span>

        <!-- 6 · Tags (register §3.6, plan stage 7e) — keyboard-first JIRA-style chips. Each
             committed chip is a removable pill carrying a hidden tagId the commit submits; typing
             then Enter commits a chip via /categories/tags/resolve (which creates/reuses the tag
             and returns the pill, appended to the list). `:` nests (Car:Passat); Backspace on the
             empty input removes the last pill. All the keyboard affordances live in the keyboard.js
             leaf (CLAUDE.md §1.6); resolution/create is server-side, like every other picker. Edit
             mode pre-fills the loaded transaction's tags as pills so a re-save preserves them. -->
        <div class="field field--tags" data-tag-field>
          <label class="field__label" for="entry-tags">Tags</label>
          <div class="chips">
            <span id="entry-tag-chips" class="chips__list" data-tag-chips>
              <th:block th:if="${edit != null}">
                <th:block th:each="t : ${edit.tags()}">
                  <th:block
                    th:replace="~{fragments/entry-dock :: tagChip(tagId=${t.tagId()}, tagLabel=${t.label()}, fieldName='tagId')}"
                  ></th:block>
                </th:block>
              </th:block>
            </span>
            <input
              id="entry-tags"
              name="tagText"
              class="input chips__input"
              list="entry-tag-options"
              autocomplete="off"
              placeholder="Car:Passat"
              data-tag-input
              hx-post="/categories/tags/resolve"
              hx-trigger="tag-commit"
              hx-include="this"
              hx-target="#entry-tag-chips"
              hx-swap="beforeend"
            />
            <!-- Existing tags as pick-ahead suggestions (populated in the register view). -->
            <datalist id="entry-tag-options">
              <option th:each="tl : ${register.tagOptions()}" th:value="${tl}"></option>
            </datalist>
          </div>
        </div>

        <!-- 7 · Note -->
        <div class="field">
          <label class="field__label" for="entry-note">Note</label>
          <input id="entry-note" name="note" class="input" autocomplete="off" th:value="${edit != null} ? ${edit.note()}" />
        </div>

        <!-- 8 · Actions. New mode: Add. Edit mode: Save · Void · Cancel (§3.1). Void hx-posts to
             /register/void (the whole form rides along); Cancel reloads a fresh new-mode dock. -->
        <p class="actions" th:if="${!isEdit}">
          <button type="submit" class="btn">Add</button>
          <!-- Split (register §3.9): take the committed single line into the split panel, which
               replaces the dock. Carries the dock's fields so the panel opens seeded (§3.10). -->
          <button
            type="button"
            class="btn btn--ghost"
            data-kbd-split
            hx-post="/register/split"
            hx-include="closest form"
            hx-target="#entry-dock"
            hx-swap="outerHTML"
          >
            Split
          </button>
        </p>
        <p class="actions" th:if="${isEdit}">
          <button type="submit" class="btn">Save</button>
          <button
            type="button"
            class="btn btn--danger"
            hx-post="/register/void"
            hx-confirm="Void this transaction? It can be restored later."
          >
            Void
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            hx-get="/register/dock"
            hx-include="[name='viewAccountId'], [name='viewFromDate'], [name='viewToDate'], [name='viewPayeeId']"
            hx-target="#entry-dock"
            hx-swap="outerHTML"
          >
            Cancel
          </button>
        </p>
      </div>

      <!-- Status line, below the fields so it never changes the fields' row height/alignment: the
           resolved category id (hidden) the dock commits, and the ghost suggestion note (§3.9). -->
      <div class="entry-dock__status">
        <!-- The resolved funding leg, swapped in by /register/account/resolve: either the hidden
             accountId, or the funding person's name/direction (their leaf is provisioned at commit,
             once the transaction currency is known). Pre-filled on first render so the dock is
             committable without touching the field.

             It lives on this status line, not beside the Account field, for the same reason the
             category's does: .entry-dock__fields is a flex row, so a visible label there becomes a
             column of its own and shoves every following control sideways as it appears. -->
        <span id="entry-account-resolved">
          <input
            type="hidden"
            name="accountId"
            th:value="${edit != null and edit.accountEntryText() != null}
                      ? ${edit.accountId()} : ${register.defaultAccountId()}"
          />
        </span>
        <!-- The resolved category id (hidden) + status, swapped in by /categories/resolve. In edit
             mode it starts pre-filled with the loaded transaction's category id. -->
        <span id="entry-category-resolved" data-counterpart-resolved>
          <input type="hidden" name="categoryId" th:value="${edit != null and edit.categoryId() != null} ? ${edit.categoryId()} : ''" />
          <!-- The transfer marker (register §3.8, plan stage 7f): when the edited transaction is a
               transfer, the direction the commit signs the funding leg by must be pre-filled here
               too — otherwise a plain Save submits the counterpart account id as if it were a
               category, and the sign flips. Re-picking the category re-renders this whole slot (the
               /categories/resolve response), so switching to a category clears the marker. -->
          <input
            th:if="${edit != null and edit.transferDirection() != null}"
            type="hidden"
            name="transferDirection"
            th:value="${edit.transferDirection()}"
          />
        </span>
        <!-- The ghost suggestion note (§3.9), filled by /register/ghost. -->
        <span id="entry-ghost" class="entry-dock__ghost muted"></span>
      </div>

      <p class="entry-dock__error warning" th:if="${entryError}" th:text="${entryError}"></p>
    </form>

    <!-- POST /register/entry success response: the repainted rows region (the primary swap into
         #register-body) plus the reset dock (oob=true, so its hx-swap-oob lifts it out to replace
         #entry-dock). One response repaints the affected thread and clears the dock for the next
         entry — both top-level elements are parse-safe (a div and a form). -->
    <!-- `sticky` is a pre-filled NEW dock (a DockEditModel with a null transactionId) carrying the
         date and funding account just committed, so consecutive entries on the same account and day
         need no re-typing (register §3.3, plan stage 8b.1). Null falls back to a bare reset. -->
    <th:block th:fragment="committed(register, amountFields, sticky)">
      <div th:replace="~{register :: rows(${register})}"></div>
      <div
        th:replace="~{fragments/entry-dock :: dock(${register}, true, ${sticky}, ${amountFields})}"
      ></div>
    </th:block>

    <!-- The extra amount field(s) themselves (§3.8a) — inlined directly within `dock` (so a normal
         whole-dock re-render, e.g. edit/reset/error, always shows the right fields) AND reused as
         the primary-swap body of the /register/currency-fields response below. Empty (no inputs) in
         the untouched single-currency case — the ≥95% path renders nothing extra. -->
    <div
      th:fragment="extraAmountFields(fields)"
      id="entry-currency-amount"
      class="entry-dock__extra-amounts"
    >
      <!-- Category leg's own native magnitude (§3.8a) — shown once the currency selector diverges
           from the funding account's. Plain sign-free magnitude; direction always mirrors the
           funding leg's, so no override is offered here (register §3.8). -->
      <div class="field field--amount" th:if="${fields.crossCurrency()}">
        <label
          class="field__label"
          for="entry-category-amount"
          th:text="'Amount (' + ${fields.categoryCurrencyCode()} + ')'"
        >
          Amount (CHF)
        </label>
        <input
          id="entry-category-amount"
          name="categoryAmount"
          class="input num"
          inputmode="decimal"
          autocomplete="off"
          th:value="${fields.categoryAmountText()}"
        />
      </div>
      <!-- Base amount (§3.8a) — only when neither leg is the book's base currency. Pre-filled from
           rate_as_of, confirmable/editable; frozen on both legs (data-model §6.4), never written
           back to the exchange-rate feed. -->
      <div class="field field--amount" th:if="${fields.neitherIsBase()}">
        <label class="field__label" for="entry-base-amount">Base amount</label>
        <input
          id="entry-base-amount"
          name="baseAmount"
          class="input num"
          inputmode="decimal"
          autocomplete="off"
          th:value="${fields.baseAmountText()}"
        />
      </div>
    </div>

    <!-- The funding Amount field itself (register §3.8a) — its own fragment (hx-swap-oob baked
         in, inert unless returned as a top-level element of a response) so a funding-account
         change can refresh just its currency label via /register/currency-fields, below, without
         resetting whatever the user has already typed. -->
    <div
      th:fragment="fundingAmountField(fields, amountText, oob)"
      id="entry-amount-field"
      class="field field--amount"
      th:attr="hx-swap-oob=${oob} ? 'true'"
    >
      <label
        class="field__label"
        for="entry-amount"
        th:text="'Amount (' + ${fields.fundingCurrencyCode()} + ')'"
      >
        Amount (EUR)
      </label>
      <input
        id="entry-amount"
        name="amount"
        class="input num"
        inputmode="decimal"
        autocomplete="off"
        placeholder="31,50"
        th:value="${amountText}"
        required
      />
    </div>

    <!-- POST /register/currency-fields response (plan stage 7d.1) — controller-only, never included
         from within `dock` itself (that would duplicate the picker on a plain page load): the
         currency picker and the funding Amount field, both out-of-band (each keeps its own shown
         value/label in sync with whichever select triggered the recompute — the currency
         selector's own change, or the funding account's), plus the primary swap of the extra
         amount field(s) into #entry-currency-amount. -->
    <th:block th:fragment="currencyFieldsResponse(fields, fundingAmountText)">
      <div
        th:replace="~{fragments/currency-picker :: picker('entry-category-currency', 'categoryCurrencyCode', ${fields.categoryCurrencyCode()}, true)}"
      ></div>
      <div
        th:replace="~{fragments/entry-dock :: fundingAmountField(fields=${fields}, amountText=${fundingAmountText}, oob=true)}"
      ></div>
      <div th:replace="~{fragments/entry-dock :: extraAmountFields(fields=${fields})}"></div>
    </th:block>

    <!-- POST /categories/resolve response: the hidden category id the caller submits, plus a small
         status (the resolved category name, or an error). Swapped into the caller's resolved slot.
         Parameterised (plan stage 7c.2/7d.3): `fieldName` names the hidden id input (categoryId for
         the dock, lineCategoryId for a split line); when `typeFieldName` is set, a second hidden
         input carries the resolved income/expense type — the split line needs it to sign its share
         in the live remaining/direction readout; when `directionFieldName` is set (lineTransferDirection
         for a split line) the transfer-direction input is emitted on every line, blank for a
         category, so the aligned line arrays stay aligned. The dock resolves without those, so they
         default (its transfer marker is emitted only when a transfer resolves).

         `personFieldPrefix` does for the person inputs what `directionFieldName` does for the
         transfer marker (plan stage 8b.2): unset, they are the dock's `personName`/`personDirection`/
         `personRevive`, emitted only when a person actually resolved; set to `line`, they become
         `linePersonName`/`linePersonDirection`/`linePersonRevive` and every line emits them (blank
         for a category) so the aligned line arrays stay aligned. `index` is the line being resolved,
         carried so the revival buttons below re-post against the right one (0 for the dock). -->
    <th:block
      th:fragment="categoryResolved(categoryId, categoryName, error, fieldName, typeFieldName, categoryType, transferDirection, directionFieldName, personName, personDirection, personRevive, personPending, personPendingName, personFieldPrefix, index)"
      th:with="resolveVals=|&quot;fieldName&quot;:&quot;${fieldName}&quot;,&quot;typeFieldName&quot;:&quot;${typeFieldName == null ? '' : typeFieldName}&quot;,&quot;directionFieldName&quot;:&quot;${directionFieldName == null ? '' : directionFieldName}&quot;,&quot;personFieldPrefix&quot;:&quot;${personFieldPrefix == null ? '' : personFieldPrefix}&quot;,&quot;index&quot;:${index == null ? 0 : index}|"
    >
      <input type="hidden" th:name="${fieldName}" th:value="${categoryId}" />
      <input
        th:if="${typeFieldName != null}"
        type="hidden"
        th:name="${typeFieldName}"
        th:value="${categoryType}"
      />
      <!-- A transfer target (register §3.8, plan stage 7d.3): the direction the commit signs the
           funding leg by. For the dock (no directionFieldName) it is emitted only when a transfer
           resolved — the whole slot re-renders each resolve, so switching back to a category clears
           the marker. For a split line (directionFieldName = lineTransferDirection) it is emitted on
           every line, blank for a category, so the index-aligned line arrays stay aligned. -->
      <input
        th:if="${directionFieldName != null ? true : transferDirection != null}"
        type="hidden"
        th:name="${directionFieldName != null ? directionFieldName : 'transferDirection'}"
        th:value="${transferDirection}"
      />
      <!-- A person target (register §3.5, plan stage 8b, data-model §7): for/by resolve to a name
           and direction, not an id — the leaf is auto-provisioned at commit, once the currency is
           known. Blank while a revival decision is pending (personPending, below). -->
      <input
        th:if="${personFieldPrefix != null ? true : personName != null}"
        type="hidden"
        th:name="${personFieldPrefix != null ? personFieldPrefix + 'PersonName' : 'personName'}"
        th:value="${personName}"
      />
      <input
        th:if="${personFieldPrefix != null ? true : personDirection != null}"
        type="hidden"
        th:name="${personFieldPrefix != null ? personFieldPrefix + 'PersonDirection' : 'personDirection'}"
        th:value="${personDirection}"
      />
      <input
        th:if="${personFieldPrefix != null ? true : personRevive != null}"
        type="hidden"
        th:name="${personFieldPrefix != null ? personFieldPrefix + 'PersonRevive' : 'personRevive'}"
        th:value="${personRevive}"
      />
      <span th:if="${categoryName}" class="entry-dock__resolved muted" th:text="${categoryName}"
        >Food</span
      >
      <span th:if="${error}" class="entry-dock__resolved warning" th:text="${error}"></span>
      <!-- Revival is never silent (data-model §7): a for/by name matching only a soft-deleted
           person renders this choice instead of a ready-to-commit result. Both buttons re-post the
           typed categoryText here with personDecision set, finalising the pick into the hidden
           fields above. They carry the caller's own field names + index back, so a split line's
           choice resolves that line (plan stage 8b.2) — and target `closest
           [data-counterpart-resolved]`, the slot this fragment was swapped into, which is the dock's
           #entry-category-resolved or the line's #line-<i>-resolved without either needing naming. -->
      <span th:if="${personPending}" class="entry-dock__resolved warning">
        <span th:text="'&#8216;' + ${personPendingName} + '&#8217; is deleted.'"></span>
        <button
          type="button"
          class="btn btn--ghost"
          hx-post="/categories/resolve"
          hx-include="[name='categoryText']"
          hx-target="closest [data-counterpart-resolved]"
          hx-swap="innerHTML"
          th:attr="hx-vals=|{&quot;personDecision&quot;:&quot;REVIVE&quot;,${resolveVals}}|"
        >
          Restore
        </button>
        <button
          type="button"
          class="btn btn--ghost"
          hx-post="/categories/resolve"
          hx-include="[name='categoryText']"
          hx-target="closest [data-counterpart-resolved]"
          hx-swap="innerHTML"
          th:attr="hx-vals=|{&quot;personDecision&quot;:&quot;NEW&quot;,${resolveVals}}|"
        >
          Create new
        </button>
      </span>
    </th:block>

    <!-- POST /categories/tags/resolve response (register §3.6, plan stage 7e): one removable chip
         pill carrying the hidden tag id the dock submits. Appended (hx-swap="beforeend") to
         #entry-tag-chips; the keyboard.js leaf clears + refocuses the input after the swap so the
         next chip can be typed. Also rendered inline for each of an edited transaction's tags
         (edit-mode pre-fill). A blank chip yields an empty fragment (no pill). `fieldName` names
         the hidden id input (tagId for the dock; a split line passes its own — plan stage 7e.3). -->
    <!-- POST /register/account/resolve response (register §3.3, plan stage 8b.1): the resolved
         funding leg — either the hidden accountId, or the funding person's name/direction (whose
         leaf is provisioned at commit) — plus a status. Swapped into #entry-account-resolved.

         Exactly one branch emits hidden inputs, and an error emits none: the whole slot re-renders
         on every resolve, so unresolvable text leaves nothing behind and the commit fails
         validation rather than booking against a stale id (§3.3). -->
    <th:block
      th:fragment="accountResolved(accountId, fundingPersonName, fundingPersonDirection,
                   fundingPersonRevive, accountName, error, personPending, personPendingName)"
    >
      <input th:if="${accountId != null}" type="hidden" name="accountId" th:value="${accountId}" />
      <input
        th:if="${fundingPersonName != null}"
        type="hidden"
        name="fundingPersonName"
        th:value="${fundingPersonName}"
      />
      <input
        th:if="${fundingPersonDirection != null}"
        type="hidden"
        name="fundingPersonDirection"
        th:value="${fundingPersonDirection}"
      />
      <input
        th:if="${fundingPersonRevive != null}"
        type="hidden"
        name="fundingPersonRevive"
        th:value="${fundingPersonRevive}"
      />
      <span th:if="${accountName}" class="entry-dock__resolved muted" th:text="${accountName}"
        >Cash (EUR)</span
      >
      <span th:if="${error}" class="entry-dock__resolved warning" th:text="${error}"></span>
      <!-- Revival is never silent (data-model §7): a for/by name in the Account field matching only
           a soft-deleted person renders the same three-way choice the Category field does. Both
           buttons re-post the typed accountText with personDecision set. -->
      <span th:if="${personPending}" class="entry-dock__resolved warning">
        <span th:text="'&#8216;' + ${personPendingName} + '&#8217; is deleted.'"></span>
        <button
          type="button"
          class="btn btn--ghost"
          hx-post="/register/account/resolve"
          hx-include="[name='accountText']"
          hx-vals='{"personDecision":"REVIVE"}'
          hx-target="#entry-account-resolved"
          hx-swap="innerHTML"
        >
          Restore
        </button>
        <button
          type="button"
          class="btn btn--ghost"
          hx-post="/register/account/resolve"
          hx-include="[name='accountText']"
          hx-vals='{"personDecision":"NEW"}'
          hx-target="#entry-account-resolved"
          hx-swap="innerHTML"
        >
          Create new
        </button>
      </span>
    </th:block>

    <th:block th:fragment="tagChip(tagId, tagLabel, fieldName)">
      <span th:if="${tagId != null}" class="chip" data-tag-chip>
        <span class="chip__label" th:text="${tagLabel}">Car:Passat</span>
        <button
          type="button"
          class="chip__remove"
          data-tag-remove
          aria-label="Remove tag"
          title="Remove tag"
        >
          ×
        </button>
        <input type="hidden" th:name="${fieldName}" th:value="${tagId}" />
      </span>
    </th:block>

    <!-- GET /register/ghost response: the suggested category note (§3.9). Swapped into #entry-ghost;
         when a suggestion exists it also OOB-fills the category field's text AND the resolved hidden
         categoryId — the ghost is an existing category the query already resolved, so the dock is
         immediately committable without the user re-triggering /categories/resolve by editing the
         field (the change event never fires for a programmatic fill). -->
    <th:block th:fragment="ghost(categoryId, categoryName)">
      <th:block th:if="${categoryName}">
        <span aria-hidden="true">auto · </span><span th:text="${categoryName}">Fuel</span>
        <!-- OOB-fill the category input with the suggestion so the single ghost line shows there. -->
        <input
          id="entry-category"
          name="categoryText"
          class="input"
          list="entry-category-options"
          autocomplete="off"
          th:value="${categoryName}"
          hx-swap-oob="true"
          hx-post="/categories/resolve"
          hx-trigger="change"
          hx-target="#entry-category-resolved"
          hx-swap="innerHTML"
        />
        <!-- OOB-fill the hidden categoryId the dock commits, so accepting the ghost as-is is enough
             (register §3.9). Mirrors the /categories/resolve response's #entry-category-resolved. -->
        <span id="entry-category-resolved" hx-swap-oob="true">
          <input type="hidden" name="categoryId" th:value="${categoryId}" />
        </span>
      </th:block>
    </th:block>
  </body>
</html>
