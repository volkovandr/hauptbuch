<!DOCTYPE html>
<!--
  Base layout — the server-rendered shell every screen hangs on (plan stage 4).

  Uses Thymeleaf's native fragment composition (th:fragment / th:replace), not the layout-dialect,
  to avoid an extra dependency. A page calls this fragment and passes its content fragment in:
      <html th:replace="~{layout :: page(~{::content})}">

  Visual identity (FR-UX-04 — dense, restrained, spreadsheet-like): the app is named "Hauptbuch"
  (German for the general ledger, the bound master accounting book), and the shell is dressed as a
  page from that book — warm ledger stock, faint green feint rules, a hard rule before the numeric
  column, oxblood ink for credits/negatives, tabular figures throughout. Styles are split across
  /css/{base,shell,accounts,register}.css — base first (design tokens + shared primitives), then
  the feature layers that build on it.
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="page(content)">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title} ?: 'Hauptbuch'">Hauptbuch</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" />
    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/shell.css}" />
    <link rel="stylesheet" th:href="@{/css/accounts.css}" />
    <link rel="stylesheet" th:href="@{/css/register.css}" />
    <!-- htmx and the keyboard leaf are vendored locally (no CDN, no bundler) — offline-capable. -->
    <script th:src="@{/js/htmx.min.js}" defer></script>
    <script th:src="@{/js/keyboard.js}" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <!--
      Global htmx error slot (issue 10). Empty on a normal render; the global error boundary
      (GlobalHtmxErrorAdvice) retargets an unexpected exception's response here (HX-Retarget +
      innerHTML swap) so the failure is shown as a toast without blanking the element that
      triggered the request. A live region so assistive tech announces it.
    -->
    <div id="app-error" class="app-error" role="alert" aria-live="assertive"></div>
    <header class="app-bar">
      <a class="app-bar__brand" th:href="@{/}" th:text="'Hauptbuch'">Hauptbuch</a>
      <span class="app-bar__sub">Das Hauptbuch — general ledger</span>
      <nav class="nav" aria-label="Primary">
        <a
          th:each="item : ${nav}"
          class="nav__item"
          th:classappend="${item.current()} ? 'nav__item--current'"
          th:href="@{${item.path()}}"
          th:text="${item.label()}"
          th:aria-current="${item.current()} ? 'page'"
          >Section</a
        >
      </nav>
    </header>
    <main id="content" class="content" th:replace="${content}">
      <p>Page content goes here.</p>
    </main>
  </body>
</html>
